services:
  - type: web
    name: ikodi-management-system
    env: node
    plan: starter
    buildCommand: corepack enable && corepack prepare pnpm@latest --activate && pnpm install --frozen-lockfile && pnpm run render:build
    startCommand: pnpm run render:start
    envVars:
      - key: NODE_ENV
        value: production
      - key: BASE_PATH
        value: /
      - key: SESSION_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_MESSAGING_SERVICE_SID
        sync: false
      - key: TWILIO_SENDER_ID
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: SMS_BRAND_NAME
        value: IKODI
