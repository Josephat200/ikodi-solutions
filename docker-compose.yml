services:
  postgres:
    image: postgres:16-alpine
    container_name: ikodi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ikodi
      POSTGRES_PASSWORD: ikodi_dev_password
      POSTGRES_DB: ikodi_db
    ports:
      - "5432:5432"
    volumes:
      - ./.local/postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ikodi -d ikodi_db"]
      interval: 5s
      timeout: 5s
      retries: 10
